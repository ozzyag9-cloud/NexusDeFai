version: "3.9"

# ─────────────────────────────────────────────────────────────
# NEXUS AI — Docker Compose
#
# Usage:
#   cp .env.example .env && nano .env   # fill in your tokens
#   docker compose up -d                # start everything
#   docker compose logs -f nexus_ai     # watch logs
#   docker compose down                 # stop
#
# Dashboard: http://localhost:8000/dashboard?secret=YOUR_ADMIN_SECRET
# API docs:  http://localhost:8000/docs
# ─────────────────────────────────────────────────────────────

services:

  nexus_ai:
    build: .
    container_name: nexus_ai
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - nexus_db:/app/nexus_ai.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # Optional: Nginx reverse proxy with SSL
  # Uncomment to expose on a domain with HTTPS
  # nginx:
  #   image: nginx:alpine
  #   container_name: nexus_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - nexus_ai

volumes:
  nexus_db:
    driver: local
