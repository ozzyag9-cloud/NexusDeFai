# ─────────────────────────────────────────────────────────────
# NEXUS AI — Nginx Reverse Proxy Config
#
# Prerequisites:
#   1. Point your domain DNS A record to your VPS IP
#   2. Install certbot: apt install certbot python3-certbot-nginx
#   3. Get SSL cert: certbot --nginx -d yourdomain.com
#   4. Copy this file to: /etc/nginx/sites-available/nexus_ai
#   5. Enable: ln -s /etc/nginx/sites-available/nexus_ai /etc/nginx/sites-enabled/
#   6. Test: nginx -t && systemctl reload nginx
#
# Replace YOUR_DOMAIN with your actual domain (e.g. signals.yoursite.com)
# ─────────────────────────────────────────────────────────────

upstream nexus_ai {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/nexus_ai_access.log;
    error_log  /var/log/nginx/nexus_ai_error.log;

    # Rate limiting (protect API from abuse)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=dashboard_limit:10m rate=10r/m;

    # ── Landing page (static HTML served directly) ────────────
    location = / {
        root /home/ubuntu/nexus_ai;
        try_files /landing_page.html =404;
    }

    # ── API endpoints ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         http://nexus_ai;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # ── Admin dashboard (rate limited, accessible via secret) ──
    location /dashboard {
        limit_req zone=dashboard_limit burst=5 nodelay;

        proxy_pass         http://nexus_ai;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── FastAPI docs (disable in production if preferred) ─────
    location /docs {
        proxy_pass         http://nexus_ai;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://nexus_ai;
    }

    # ── Health check (public) ─────────────────────────────────
    location /health {
        proxy_pass         http://nexus_ai;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Block common attack paths ─────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 404;
    }

    location ~ /\.ht {
        deny all;
    }
}
